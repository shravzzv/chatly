name: CI Hooks
permissions:
  contents: read

on:
  push:
    branches: [ main ]
    paths:
      - 'packages/hooks/**'

  pull_request:
    branches: [ main ]
    paths:
      - 'packages/hooks/**'

jobs:
  jest-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Run Jest tests
        run: npm run test:hooks
